<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cupcake Recipe | 多绚的调味手账</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #FFFDF5;
            --text-brown: #5D4037;
            --grid-line: #EBE7D9;
            --margin-line: #F2A7AD;
            
            /* 三大入口配色方案 */
            --color-sig: #F8D7DA;    /* 草莓红/招牌 */
            --color-velvet: #E2D1F9; /* 粉紫/丝绒 */
            --color-fresh: #DFF0D8;  /* 浅绿/豆乳 */

            --font-en: 'Dancing Script', cursive;
            --font-zh: "STXingkai", "华文行楷", "PingFang SC", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #E6E2D3;
            font-family: var(--font-zh);
            font-weight: 300;
            color: var(--text-brown);
            padding: 20px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* 手账主体 */
        .journal-book {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-paper);
            min-height: 100vh;
            position: relative;
            box-shadow: 10px 10px 50px rgba(0,0,0,0.1);
            padding: 70px 40px;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--margin-line) 2px, transparent 2px);
            background-size: 25px 25px, 25px 25px, 100% 100%;
            background-position: 0 0, 0 0, 50px 0;
        }

        header { text-align: center; margin-bottom: 60px; }
        .art-title { font-family: var(--font-en); font-size: 4.5rem; font-weight: 700; line-height: 1; }
        .subtitle { font-size: 1.8rem; letter-spacing: 4px; margin: 10px 0; }
        .hint-text { font-family: var(--font-en); font-size: 1.2rem; color: #999; }

        /* 入口网格布局 */
        .flavor-selection {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 40px;
        }

        /* 通用入口卡片样式 (拍立得风格) */
        .flavor-link {
            text-decoration: none;
            color: inherit;
            width: 280px;
            background: #fff;
            padding: 15px 15px 40px 15px;
            border: 1px solid #eee;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* 每个入口微调旋转角度，模拟随手粘贴 */
        .flavor-link:nth-child(1) { transform: rotate(-2deg); }
        .flavor-link:nth-child(2) { transform: rotate(1.5deg); }
        .flavor-link:nth-child(3) { transform: rotate(-1deg); }

        /* Hover 效果：揭起标签 */
        .flavor-link:hover {
            transform: translateY(-15px) rotate(0deg) scale(1.05);
            box-shadow: 20px 30px 50px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .img-placeholder {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 15px;
            border: 1px solid #f9f9f9;
        }

        /* 风格标签 (纸胶带效果) */
        .style-label {
            display: inline-block;
            font-size: 0.9rem;
            padding: 2px 12px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            border-left: 2px dotted rgba(255,255,255,0.8);
            border-right: 2px dotted rgba(255,255,255,0.8);
        }

        .flavor-name {
            font-size: 1.5rem;
            text-align: center;
            margin-top: 10px;
            font-weight: 400;
        }

        .en-tag {
            font-family: var(--font-en);
            font-size: 1.3rem;
            display: block;
            text-align: center;
            color: #999;
        }

        /* 差异化配色 */
        /* 1. 招牌草莓 */
        .sig-card .img-placeholder { background-color: #FFF0F1; }
        .sig-card .style-label { background-color: var(--color-sig); }
        
        /* 2. 丝绒缎带 */
        .velvet-card .img-placeholder { background-color: #F8F0FF; }
        .velvet-card .style-label { background-color: var(--color-velvet); }

        /* 3. 清爽豆乳 */
        .fresh-card .img-placeholder { background-color: #F0F9EB; }
        .fresh-card .style-label { background-color: var(--color-fresh); }

        footer {
            text-align: center;
            padding: 80px 0 40px;
            font-family: var(--font-en);
            font-size: 1.5rem;
            opacity: 0.5;
        }

        /* 移动端自动转纵向 */
        @media (max-width: 768px) {
            .flavor-selection { flex-direction: column; align-items: center; }
            .flavor-link { width: 90%; transform: rotate(0) !important; }
            .art-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="journal-book">
        <header>
            <h1 class="art-title">The Cupcake Recipe</h1>
            <p class="subtitle">多绚的调味手账</p>
            <p class="hint-text">Select a flavor to see the timeline. (选择一种口味查看糖点时间线)</p>
        </header>

        <main>
            <div class="flavor-selection">
                
                <a href="body1.html" class="flavor-link sig-card">
                    <span class="style-label">本店招牌 / Signature</span>
                    <div class="img-placeholder">🍓🧁</div>
                    <h3 class="flavor-name">Jiwoo × Stella</h3>
                    <span class="en-tag">Strawberry Base</span>
                </a>

                <a href="body2.html" class="flavor-link velvet-card">
                    <span class="style-label">丝绒缎带 / Velvet Ribbon</span>
                    <div class="img-placeholder">🎀🧁</div>
                    <h3 class="flavor-name">Yuha × Stella</h3>
                    <span class="en-tag">Purple Velvet</span>
                </a>

                <a href="body3.html" class="flavor-link fresh-card">
                    <span class="style-label">清爽豆乳 / Fresh Edamame</span>
                    <div class="img-placeholder">🫛🧁</div>
                    <h3 class="flavor-name">Ian × Stella</h3>
                    <span class="en-tag">Soymilk Fresh</span>
                </a>

            </div>
        </main>

        <footer>
            <p>Handmade by Stella's Chef @ 2026</p>
        </footer>
    </div>

</body>
</html>
