<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24糖点观测日记 | The Cupcake Recipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-paper: #FFFDF5;
            --accent-pink: #F8D7DA;
            --text-brown: #5D4037;
            --line-color: #D2B48C;
            --font-zh: "STXingkai", "华文行楷", "PingFang SC", sans-serif;
            
            /* 气泡调色盘 */
            --bubble-pink: #FFF0F1;
            --bubble-green: #F0F9EB;
            --bubble-blue: #F0F7FF;
            --bubble-yellow: #FEF9E7;
            --bubble-purple: #F5EEFD;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #E6E2D3;
            font-family: var(--font-zh);
            font-weight: 300;
            color: var(--text-brown);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .page-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-paper);
            min-height: 100vh;
            position: relative;
            box-shadow: 10px 10px 40px rgba(0,0,0,0.1);
            padding: 60px 40px;
            background-image: radial-gradient(#EBE7D9 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 纸胶带返回按钮 */
        .back-btn {
            position: absolute; top: 20px; left: -15px;
            background: var(--accent-pink); color: var(--text-brown);
            text-decoration: none; padding: 8px 25px; transform: rotate(-2deg);
            z-index: 10; border-left: 2px dashed #fff; border-right: 2px dashed #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        header { text-align: center; margin-bottom: 50px; }
        .page-title { font-size: 2.5rem; margin-bottom: 10px; }

        /* 时间线样式 */
        .timeline-container { position: relative; padding: 20px 0; min-height: 100px; }
        .timeline-container::before {
            content: ''; position: absolute; left: 20px; top: 0; bottom: 0;
            width: 2px; border-left: 2px dashed var(--line-color);
        }

        .candy-card {
            position: relative; margin-left: 50px; margin-bottom: 40px;
            background: #fff; padding: 20px; border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }
        .candy-card:hover { transform: translateX(5px); }

        .candy-card::after {
            content: ''; position: absolute; left: -38px; top: 25px;
            width: 12px; height: 12px; background: var(--accent-pink);
            border-radius: 50%; border: 2px solid #fff;
        }

        .candy-date { font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: #D48891; }
        .candy-link { font-size: 0.8rem; color: #999; text-decoration: none; border-bottom: 1px solid #eee; }

        /* 输入区通用样式 */
        .input-section {
            margin-top: 60px; padding: 30px; border: 2px dashed var(--line-color); border-radius: 15px;
            background: rgba(255,255,255,0.3);
        }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: var(--font-zh); outline: none; }
        button { background: var(--text-brown); color: white; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }

        /* 心情气泡样式 */
        #comment-display {
            margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .mood-bubble {
            display: inline-block; padding: 15px 20px;
            max-width: 260px; min-width: 140px;
            border-radius: 20px 20px 20px 0; /* 不规则圆角 */
            position: relative; opacity: 0.9;
            box-shadow: 4px 8px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
            animation: floating 4s ease-in-out infinite;
            vertical-align: top;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(var(--bubble-rotate)); }
            50% { transform: translateY(-10px) rotate(var(--bubble-rotate)); }
        }

        .bubble-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 4px; }
        
        #loading-status { text-align: center; color: #999; font-style: italic; margin: 20px 0; }
        
        hr { border: none; border-top: 1px solid var(--line-color); margin: 60px 0; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="page-container">
        <a href="index.html" class="back-btn">⇠ 返回主页</a>

        <header>
            <h1 class="page-title">24糖点观测日记</h1>
            <p style="font-family:'Dancing Script'; color:#999; font-size:1.5rem;">Strawberry Notes: Jiwoo × Stella</p>
        </header>

        <div id="loading-status">正在翻开手账本...</div>

        <div id="timeline" class="timeline-container"></div>

        <section class="input-section">
            <h3 style="margin-bottom:15px; text-align:center;">+ 记录新的心动时刻</h3>
            <div class="input-group">
                <input type="date" id="input-date">
                <textarea id="input-content" placeholder="记录心动瞬间..."></textarea>
                <input type="text" id="input-link" placeholder="证明链接 (可选)">
                <button onclick="addNewCandy()">同步至云端手账</button>
            </div>
        </section>

        <hr>

        <section>
            <h2 style="text-align:center; margin-bottom:20px;">💬 调味评价墙</h2>
            <div id="comment-display"></div>

            <div class="input-section" style="background: #fffcf0; border-style: dotted;">
                <h3 style="margin-bottom:15px; text-align:center;">留下你的心情</h3>
                <div class="input-group">
                    <input type="text" id="comment-name" placeholder="你的昵称 (默认: 匿名甜点师)">
                    <textarea id="comment-msg" placeholder="限 140 字以内的甜蜜留言..." maxlength="140"></textarea>
                    <button onclick="sendComment()" style="background: #D48891;">挂上留言墙</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- Supabase 配置 ---
        const SUPABASE_URL = 'https://gzhsvctnisnoimiddoia.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aHN2Y3RuaXNub2ltaWRkb2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODk4NzcsImV4cCI6MjA4ODc2NTg3N30.tgYKAX_lbjsQ0snGFWLMc6pTUtgmv-D9EywWAOxmbqQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const BUCKET_NAME = '24'; 
        const DATA_FILE = 'body1_data.json';    // 糖点数据文件
        const COMMENT_FILE = 'body1_comments.json'; // 留言数据文件

        const moodPalette = ['#FFF0F1', '#F0F9EB', '#F0F7FF', '#FEF9E7', '#F5EEFD'];
        let candyData = [];
        let commentData = [];

        // --- 核心逻辑：初始化加载 ---
        async function initPage() {
            document.getElementById('loading-status').innerText = "正在翻开手账本...";
            
            // 并发下载两个文件
            const [dataRes, commentRes] = await Promise.all([
                _supabase.storage.from(BUCKET_NAME).download(DATA_FILE),
                _supabase.storage.from(BUCKET_NAME).download(COMMENT_FILE)
            ]);

            // 处理糖点数据
            if (!dataRes.error) {
                candyData = JSON.parse(await dataRes.data.text());
                renderTimeline();
            }

            // 处理留言数据
            if (!commentRes.error) {
                commentData = JSON.parse(await commentRes.data.text());
                renderComments();
            }

            document.getElementById('loading-status').style.display = 'none';
        }

        // --- 糖点功能 ---
        function renderTimeline() {
            const container = document.getElementById('timeline');
            container.innerHTML = '';
            candyData.sort((a, b) => new Date(a.date) - new Date(b.date));
            candyData.forEach(item => {
                const article = document.createElement('article');
                article.className = 'candy-card';
                article.innerHTML = `
                    <span class="candy-date">${item.date}</span>
                    <p style="margin:10px 0;">${item.content}</p>
                    ${item.link ? `<a href="${item.link}" target="_blank" class="candy-link">Proof ↗</a>` : ''}
                `;
                container.appendChild(article);
            });
        }

        async function addNewCandy() {
            const date = document.getElementById('input-date').value;
            const content = document.getElementById('input-content').value;
            const link = document.getElementById('input-link').value;

            if (!date || !content) return alert("日期和内容是必填的哦！");

            candyData.push({ date, content, link });
            const blob = new Blob([JSON.stringify(candyData, null, 2)], { type: 'application/json' });
            
            const { error } = await _supabase.storage.from(BUCKET_NAME).upload(DATA_FILE, blob, { upsert: true });

            if (error) alert("同步失败: " + error.message);
            else {
                alert("✨ 糖点记录成功！");
                renderTimeline();
            }
        }

        // --- 留言板功能 ---
        function renderComments() {
            const display = document.getElementById('comment-display');
            display.innerHTML = '';
            commentData.forEach(c => {
                const bubble = document.createElement('div');
                bubble.className = 'mood-bubble';
                
                // 随机属性
                const bgColor = moodPalette[Math.floor(Math.random() * moodPalette.length)];
                const randomRotate = (Math.random() * 6 - 3).toFixed(1) + 'deg';
                
                bubble.style.backgroundColor = bgColor;
                bubble.style.setProperty('--bubble-rotate', randomRotate);
                bubble.style.animationDelay = (Math.random() * -4) + 's';

                bubble.innerHTML = `
                    <div class="bubble-header">
                        <strong style="color:var(--text-brown)">@${c.user_name}</strong>
                        <span class="bubble-time">${c.time}</span>
                    </div>
                    <p style="font-size:0.95rem;">${c.message}</p>
                `;
                display.appendChild(bubble);
            });
        }

        async function sendComment() {
            const name = document.getElementById('comment-name').value || "匿名甜点师";
            const msg = document.getElementById('comment-msg').value;

            if (!msg) return alert("留言内容不能为空哦！");

            const newComment = {
                user_name: name,
                message: msg,
                time: new Date().toLocaleDateString()
            };

            commentData.unshift(newComment); // 最新留言放在前面
            const blob = new Blob([JSON.stringify(commentData, null, 2)], { type: 'application/json' });
            
            const { error } = await _supabase.storage.from(BUCKET_NAME).upload(COMMENT_FILE, blob, { upsert: true });

            if (error) alert("留言同步失败: " + error.message);
            else {
                alert("💬 留言已挂上墙！");
                document.getElementById('comment-msg').value = '';
                renderComments();
            }
        }

        // 页面启动
        window.onload = initPage;
    </script>
</body>
</html>
