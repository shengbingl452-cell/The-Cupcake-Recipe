<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草莓基调：糖点观测日记 | The Cupcake Recipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #FFFDF5;
            --accent-pink: #F8D7DA;
            --text-brown: #5D4037;
            --line-color: #D2B48C; /* 缝纫线颜色 */
            --tape-gray: rgba(0, 0, 0, 0.05);
            --font-zh: "STXingkai", "华文行楷", "PingFang SC", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #E6E2D3;
            font-family: var(--font-zh);
            font-weight: 300;
            color: var(--text-brown);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 手账内页容器 */
        .page-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-paper);
            min-height: 100vh;
            position: relative;
            box-shadow: 10px 10px 40px rgba(0,0,0,0.1);
            padding: 60px 40px;
            border-radius: 5px;
            /* 网格背景 */
            background-image: radial-gradient(#EBE7D9 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 纸胶带返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: -15px;
            background: var(--accent-pink);
            color: var(--text-brown);
            text-decoration: none;
            padding: 8px 25px;
            font-size: 1.1rem;
            transform: rotate(-2deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
            border-left: 2px dashed rgba(255,255,255,0.5);
            border-right: 2px dashed rgba(255,255,255,0.5);
            transition: 0.3s;
        }

        .back-btn:hover { transform: rotate(0deg) scale(1.05); }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .sub-title {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #999;
        }

        /* 时间线主体 */
        .timeline-container {
            position: relative;
            padding: 20px 0;
        }

        /* 虚线缝纫线 */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            border-left: 2px dashed var(--line-color);
        }

        /* 糖点卡片 */
        .candy-card {
            position: relative;
            margin-left: 50px;
            margin-bottom: 40px;
            background: #fff;
            padding: 20px;
            border-radius: 15px; /* 需求：圆润边缘 */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.03); /* 模拟纸张叠放阴影 */
            transition: transform 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .candy-card:hover { transform: translateX(5px); }

        /* 时间线圆点 */
        .candy-card::after {
            content: '';
            position: absolute;
            left: -38px;
            top: 25px;
            width: 12px;
            height: 12px;
            background: var(--accent-pink);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .candy-date {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #D48891;
            margin-bottom: 10px;
            display: block;
        }

        .candy-content {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .candy-link {
            font-size: 0.9rem;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
        }

        /* 输入区域 */
        .input-section {
            margin-top: 60px;
            padding: 30px;
            background: rgba(255,255,255,0.5);
            border: 2px dashed var(--line-color);
            border-radius: 15px;
        }

        .input-section h3 { margin-bottom: 20px; text-align: center; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group input, .input-group textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: var(--font-zh);
            outline: none;
        }

        .add-btn {
            background: var(--text-brown);
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-zh);
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .add-btn:hover { background: #3e2b25; }

        @media (max-width: 600px) {
            .page-container { padding: 40px 20px; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <a href="index.html" class="back-btn">⇠ 返回主页</a>

        <header>
            <h1 class="page-title">草莓基调：糖点观测日记</h1>
            <p class="sub-title">Strawberry Notes: Stella × Jiyu</p>
        </header>

        <div id="timeline" class="timeline-container">
            </div>

        <section class="input-section">
            <h3>+ 记录新的糖点</h3>
            <div class="input-group">
                <input type="date" id="input-date">
                <textarea id="input-content" placeholder="记录下心动的瞬间..."></textarea>
                <input type="text" id="input-link" placeholder="相关链接 (可选, 如: https://...)">
                <button class="add-btn" onclick="addNewCandy()">添加至手账</button>
            </div>
        </section>
    </div>

    <script>
        // 初始化示例数据
        let candyData = [
            {
                date: "2024-03-20",
                content: "某次直播中的甜蜜互动，志宇不自觉地看向多绚的眼神被粉丝截到了。",
                link: "https://example.com/live1"
            },
            {
                date: "2024-02-14",
                content: "情人节的电台合作，两人共同演唱了那首经典的甜系情歌。",
                link: "https://example.com/song"
            }
        ];

        // 渲染时间线函数
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            // 核心逻辑：按日期排序 (由早到晚)
            candyData.sort((a, b) => new Date(a.date) - new Date(b.date));

            candyData.forEach(item => {
                const card = document.createElement('article');
                card.className = 'candy-card';
                card.innerHTML = `
                    <span class="candy-date">${item.date}</span>
                    <p class="candy-content">${item.content}</p>
                    ${item.link ? `<a href="${item.link}" target="_blank" class="candy-link">查看相关证明 ↗</a>` : ''}
                `;
                timeline.appendChild(card);
            });
        }

        // 添加新糖点函数
        function addNewCandy() {
            const dateInput = document.getElementById('input-date').value;
            const contentInput = document.getElementById('input-content').value;
            const linkInput = document.getElementById('input-link').value;

            if (!dateInput || !contentInput) {
                alert("请至少填写日期和内容哦！");
                return;
            }

            // 将新数据推入数组
            candyData.push({
                date: dateInput,
                content: contentInput,
                link: linkInput
            });

            // 清空输入框
            document.getElementById('input-date').value = '';
            document.getElementById('input-content').value = '';
            document.getElementById('input-link').value = '';

            // 重新排序并渲染
            renderTimeline();
        }

        // 页面加载时执行首次渲染
        window.onload = renderTimeline;
    </script>
</body>
</html>
